# Pre-commit hooks for atlas-gateway (INF-1).
# Hook revs are pinned to releases >=14 days old per atlas-docs/02 §2.
# ruff rev matches the ruff pinned in .trunk/trunk.yaml (Trunk is the source of truth).
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # 2025-08-09
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13  # matches .trunk/trunk.yaml ruff@0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
