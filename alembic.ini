# Alembic configuration for atlas-gateway (GW-9).
#
# Migrations run with the psycopg3 SYNC driver per ADR-010 (no asyncpg in the
# Alembic entrypoint). The database URL is supplied at runtime via the
# ATLAS_DATABASE_URL environment variable (read in alembic/env.py); the value
# below is an inert placeholder so `alembic` never carries a connection string
# in source. Example real value:
#   postgresql+psycopg://USER:PASSWORD@HOST:5432/atlas

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Placeholder only — overridden by ATLAS_DATABASE_URL in env.py. No secret here.
sqlalchemy.url = postgresql+psycopg://localhost/atlas

[post_write_hooks]
# Auto-format newly generated migrations so they satisfy Gate 1 at creation
# time. Trunk (ruff pinned in .trunk/trunk.yaml) is the single source of truth
# for ruff. `trunk check --fix` applies BOTH ruff lint autofixes (I001 import
# order from script.py.mako) AND ruff format (double quotes from repr()) in one
# pass, so a single hook suffices. `trunk` is resolved from PATH and shells out
# to the pinned ruff.
hooks = trunk_fix
trunk_fix.type = exec
trunk_fix.executable = trunk
trunk_fix.options = check --fix REVISION_SCRIPT_FILENAME --no-progress

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
