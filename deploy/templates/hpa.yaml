{{- /*
HorizontalPodAutoscaler — scales the Rollout (canary on) or the Deployment
(canary off) on CPU/memory. Enabled in prod (atlas-docs/04 §4.2); when on, the
controller manages replica count, so the Deployment/Rollout omit `replicas`.
*/ -}}
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "atlas-gateway.fullname" . }}
  labels:
    {{- include "atlas-gateway.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    {{- if .Values.canary.enabled }}
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    {{- else }}
    apiVersion: apps/v1
    kind: Deployment
    {{- end }}
    name: {{ include "atlas-gateway.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- with .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
{{- end }}
