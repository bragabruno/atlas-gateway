{{- /*
PodDisruptionBudget — preserves a minimum of healthy pods during voluntary
disruptions (node drains, upgrades). Enabled in prod (atlas-docs/04 §4.2).
*/ -}}
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "atlas-gateway.fullname" . }}
  labels:
    {{- include "atlas-gateway.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "atlas-gateway.selectorLabels" . | nindent 6 }}
{{- end }}
