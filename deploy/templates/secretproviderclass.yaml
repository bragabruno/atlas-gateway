{{- /*
SecretProviderClass — maps Azure Key Vault secrets onto the CSI volume mounted
by the pod (atlas-docs/04 §3). The app reads provider API keys from files under
secrets.mountPath; no secret value is ever placed in an env var or a plain
Kubernetes Secret. keyVaultName / tenantId / the identity client-id are injected
per env (Terraform output / CI), never committed.
*/ -}}
{{- if .Values.secrets.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "atlas-gateway.fullname" . }}
  labels:
    {{- include "atlas-gateway.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.secrets.userAssignedIdentityID | quote }}
    keyvaultName: {{ required "secrets.keyVaultName is required when secrets.enabled" .Values.secrets.keyVaultName | quote }}
    tenantId: {{ required "secrets.tenantId is required when secrets.enabled" .Values.secrets.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.secrets.objects }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType }}
        {{- end }}
{{- end }}
