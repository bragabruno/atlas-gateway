{{- /*
ServiceAccount annotated with the Azure Workload Identity client-id so the pod
can federate to Azure AD and the Secrets Store CSI driver can pull from Key
Vault without a static credential (atlas-docs/04 §3).
*/ -}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "atlas-gateway.serviceAccountName" . }}
  labels:
    {{- include "atlas-gateway.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
